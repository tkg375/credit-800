name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Verify Cloudflare token
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "ERROR: CLOUDFLARE_API_TOKEN is not set"
            exit 1
          else
            echo "CLOUDFLARE_API_TOKEN is set (length: ${#CLOUDFLARE_API_TOKEN})"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy
        run: npm run deploy:dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 3869ffbbf462deee55a7a0b1880ffb84
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_live_51T3NnY6myrw18Ks6skmFDpJmyiiYrQw0xtcrp54tQOqMVXdMhckO3IdPzChgBmeTajvIdhaGgmjQGKTEdKXlJyy8006KqBuWbV
          NEXT_PUBLIC_APP_URL: https://credit-800-dev.tgordo03.workers.dev
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
