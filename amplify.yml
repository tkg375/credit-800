version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - echo "DEBUG price id starts with= ${STRIPE_PRO_PRICE_ID:0:8}"
        - echo "DEBUG JWT_SECRET length= ${#JWT_SECRET}"
        - echo "JWT_SECRET=$JWT_SECRET" >> .env.production.local
        - echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> .env.production.local
        - echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" >> .env.production.local
        - echo "S3_ACCESS_KEY_ID=$S3_ACCESS_KEY_ID" >> .env.production.local
        - echo "S3_SECRET_ACCESS_KEY=$S3_SECRET_ACCESS_KEY" >> .env.production.local
        - echo "S3_REGION=$S3_REGION" >> .env.production.local
        - echo "S3_BUCKET=$S3_BUCKET" >> .env.production.local
        - echo "STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY" >> .env.production.local
        - echo "STRIPE_PRO_PRICE_ID=$STRIPE_PRO_PRICE_ID" >> .env.production.local
        - echo "STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET" >> .env.production.local
        - echo "OPENAI_API_KEY=$OPENAI_API_KEY" >> .env.production.local
        - echo "POSTGRID_API_KEY=$POSTGRID_API_KEY" >> .env.production.local
        - echo "OWNER_NOTIFICATION_EMAIL=$OWNER_NOTIFICATION_EMAIL" >> .env.production.local
        - echo "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=$NEXT_PUBLIC_GOOGLE_MAPS_API_KEY" >> .env.production.local
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - ~/.npm/**/*
      - .next/cache/**/*
